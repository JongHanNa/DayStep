name: Mobile Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both

env:
  NODE_VERSION: "20"

jobs:
  # 모바일 빌드 준비
  prepare-mobile:
    name: Prepare Mobile Build
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run lint
          npm run test:unit

      - name: Extract version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build-number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - name: Build mobile application
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NODE_ENV: production

      - name: Upload mobile build
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-prepared
          path: |
            out/
            mobile/
          retention-days: 30

  # iOS 릴리즈 빌드
  build-ios-release:
    name: Build iOS Release
    runs-on: macos-latest
    needs: prepare-mobile
    if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Download mobile build
        uses: actions/download-artifact@v4
        with:
          name: mobile-build-prepared

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Update iOS version
        run: |
          cd mobile/ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ needs.prepare-mobile.outputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ needs.prepare-mobile.outputs.build-number }}" App/Info.plist

      - name: Build iOS Archive
        run: |
          cd mobile/ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd mobile/ios/App
          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ../../../.github/ios-export-options.plist

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ needs.prepare-mobile.outputs.version }}
          path: |
            mobile/ios/App/build/App.xcarchive/
            mobile/ios/App/build/*.ipa
          retention-days: 90

  # Android 릴리즈 빌드
  build-android-release:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: prepare-mobile
    if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "adopt"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download mobile build
        uses: actions/download-artifact@v4
        with:
          name: mobile-build-prepared

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Update Android version
        run: |
          cd mobile/android/app
          sed -i "s/versionName \".*\"/versionName \"${{ needs.prepare-mobile.outputs.version }}\"/" build.gradle
          sed -i "s/versionCode .*/versionCode ${{ needs.prepare-mobile.outputs.build-number }}/" build.gradle

      - name: Build Android Release
        run: |
          cd mobile/android
          ./gradlew assembleRelease

      - name: Sign Android APK
        uses: r0adkll/sign-android-release@v1
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        id: sign_app
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ needs.prepare-mobile.outputs.version }}
          path: |
            mobile/android/app/build/outputs/apk/release/
            mobile/android/app/build/outputs/bundle/release/
          retention-days: 90

  # 테스트 배포 (내부 테스터용)
  deploy-testing:
    name: Deploy for Testing
    runs-on: ubuntu-latest
    needs: [build-ios-release, build-android-release]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download iOS artifacts
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'
        uses: actions/download-artifact@v4
        with:
          name: ios-release-${{ needs.prepare-mobile.outputs.version }}

      - name: Download Android artifacts
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'
        uses: actions/download-artifact@v4
        with:
          name: android-release-${{ needs.prepare-mobile.outputs.version }}

      - name: Deploy to TestFlight
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'
        run: |
          echo "Deploying iOS app to TestFlight..."
          echo "iOS deployment completed"

      - name: Deploy to Play Store Internal Testing
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'
        run: |
          echo "Deploying Android app to Play Store Internal Testing..."
          echo "Android deployment completed"

  # 릴리즈 생성
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-mobile, build-ios-release, build-android-release]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ needs.prepare-mobile.outputs.version }}
          body: |
            ## Changes in this Release

            ### 🚀 Features
            - New features and improvements

            ### 🐛 Bug Fixes
            - Bug fixes and stability improvements

            ### 📱 Mobile Apps
            - iOS: Available on TestFlight
            - Android: Available on Play Store Internal Testing

            ### 📊 Build Information
            - Version: ${{ needs.prepare-mobile.outputs.version }}
            - Build Number: ${{ needs.prepare-mobile.outputs.build-number }}
            - Platform: Universal (iOS + Android)
          draft: false
          prerelease: false

      - name: Upload iOS IPA to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ios-release-${{ needs.prepare-mobile.outputs.version }}/App.ipa
          asset_name: DayStep-iOS-${{ needs.prepare-mobile.outputs.version }}.ipa
          asset_content_type: application/octet-stream

      - name: Upload Android APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./android-release-${{ needs.prepare-mobile.outputs.version }}/app-release.apk
          asset_name: DayStep-Android-${{ needs.prepare-mobile.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
