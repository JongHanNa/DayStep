name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # 코드 품질 및 테스트
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ls --depth=0

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Generate test coverage
        run: npm run test:coverage

      - name: Run RN unit tests
        run: cd apps/mobile-rn && npx jest --ci --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # E2E 테스트 (별도 job으로 분리)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build:web
        env:
          BUILD_TARGET: web

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # 웹 빌드
  build-web:
    name: Build Web Application
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web application
        run: npm run build:web
        env:
          BUILD_TARGET: web
          NODE_ENV: production

      - name: Analyze bundle size
        run: npm run build:web
        env:
          BUILD_TARGET: web
          ANALYZE: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            .next/
            !.next/cache/
          retention-days: 30

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-web
          path: bundle-analysis-web.html
          retention-days: 30

  # 모바일 빌드
  build-mobile:
    name: Build Mobile Application
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile application
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NODE_ENV: production

      - name: Verify mobile build
        run: |
          echo "Verifying mobile build output..."
          ls -la out/
          echo "Build completed successfully"

      - name: Upload mobile build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: |
            out/
            mobile/android/app/build/
            mobile/ios/App/build/
          retention-days: 30

  # iOS 빌드 (macOS runner 필요)
  build-ios:
    name: Build iOS Application
    runs-on: macos-latest
    needs: build-mobile
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download mobile build
        uses: actions/download-artifact@v4
        with:
          name: mobile-build

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Build iOS app
        run: |
          cd mobile/ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/App.xcarchive \
            archive
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: NO

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: mobile/ios/App/build/
          retention-days: 30

  # Android 빌드
  build-android:
    name: Build Android Application
    runs-on: ubuntu-latest
    needs: build-mobile
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download mobile build
        uses: actions/download-artifact@v4
        with:
          name: mobile-build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Upload Android build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: mobile/android/app/build/outputs/
          retention-days: 30

  # 배포 (main 브랜치만)
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [build-web, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          echo "Web build deployed successfully"
        # 실제 배포 로직은 배포 환경에 따라 구성

  # 알림
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [quality, e2e, build-web, build-mobile]
    if: always()
    
    steps:
      - name: Notify build status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && "${{ needs.build-web.result }}" == "success" ]]; then
            echo "✅ Build completed successfully"
          else
            echo "❌ Build failed"
            exit 1
          fi