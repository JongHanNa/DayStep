<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390,initial-scale=1" />
<title>Variant C — Editorial Zine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f1e8;
  --paper-2: #ebe4d3;
  --ink: #1a1815;
  --ink-2: #3d372e;
  --mute: #847a6b;
  --accent: #b84a1e;
  --accent-2: #d97a4a;
  --stamp: #a02626;
  --rule: rgba(26, 24, 21, 0.25);
  --serif: 'Fraunces', 'Times New Roman', serif;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
body { min-height: 100vh; }

/* ─────────── Grain overlay ─────────── */
.app {
  position: relative;
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 0 0 140px;
  background: var(--paper);
  overflow: hidden;
}
.app::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  opacity: 0.06;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 2;
}

/* ─────────── Masthead ─────────── */
.mast {
  padding: 48px 24px 22px;
  border-bottom: 2px solid var(--ink);
  position: relative;
  z-index: 3;
}
.mast-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 14px;
}
.mast-top .seal {
  width: 22px; height: 22px;
  border: 1.5px solid var(--ink);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 700;
  font-size: 12px;
  margin-right: 8px;
  vertical-align: -6px;
}

.mast h1 {
  font-family: var(--serif);
  font-variation-settings: 'opsz' 144;
  font-weight: 900;
  font-size: 72px;
  line-height: 0.86;
  letter-spacing: -0.045em;
  margin: 4px 0 0;
  color: var(--ink);
}
.mast h1 em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  padding-right: 2px;
}
.mast-sub {
  font-family: var(--serif);
  font-weight: 400;
  font-style: italic;
  font-size: 16px;
  line-height: 1.4;
  color: var(--ink-2);
  margin: 12px 0 0;
  max-width: 320px;
}

.mast-rule {
  margin-top: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mute);
}

/* ─────────── Section nav ─────────── */
.nav {
  display: flex;
  gap: 18px;
  padding: 14px 24px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 4;
}
.nav button {
  background: transparent;
  border: 0;
  padding: 4px 0;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mute);
  cursor: pointer;
  position: relative;
}
.nav button[data-active="true"] {
  color: var(--ink);
}
.nav button[data-active="true"]::after {
  content: '';
  position: absolute;
  left: -2px; right: -2px;
  bottom: -15px;
  height: 3px;
  background: var(--accent);
}
.nav button span {
  font-family: var(--serif);
  font-weight: 600;
  font-style: italic;
  color: var(--accent);
  margin-left: 3px;
}

/* ─────────── Feature article ─────────── */
.feature {
  padding: 26px 24px 22px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.feature .kicker {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.feature h2 {
  font-family: var(--serif);
  font-variation-settings: 'opsz' 96;
  font-weight: 600;
  font-size: 30px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--ink);
  text-wrap: balance;
}
.feature .dropcap {
  font-family: var(--serif);
  font-variation-settings: 'opsz' 144;
  font-weight: 900;
  font-size: 68px;
  line-height: 0.8;
  float: left;
  margin: 6px 8px -4px 0;
  color: var(--accent);
}
.feature .body {
  margin-top: 14px;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-2);
}
.feature .byline {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mute);
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
}

/* ─────────── Article grid ─────────── */
.issue-title {
  padding: 28px 24px 10px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.issue-title h3 {
  font-family: var(--serif);
  font-variation-settings: 'opsz' 48;
  font-weight: 600;
  font-style: italic;
  font-size: 22px;
  margin: 0;
  letter-spacing: -0.01em;
}
.issue-title em {
  font-family: var(--mono);
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mute);
}

.grid {
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}

.article {
  padding: 22px 0 22px;
  border-bottom: 1px dashed var(--rule);
  position: relative;
  cursor: pointer;
}
.article:last-child { border-bottom: 0; }

.article .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 10px;
}

.article .tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px 2px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  border-radius: 2px;
  text-transform: uppercase;
}
.article .tag.feature-tag { background: var(--accent); }
.article .tag.bug-tag { background: var(--ink); }

.article h4 {
  font-family: var(--serif);
  font-variation-settings: 'opsz' 48;
  font-weight: 600;
  font-size: 18px;
  line-height: 1.25;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin: 0 0 8px;
}
.article p {
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article .stats {
  display: flex;
  gap: 14px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mute);
}
.article .stats .ship { color: #2f7a3d; }
.article .stats .reply { color: var(--accent); }

/* ─────────── CLASSIFIED (private) ─────────── */
.article.private {
  position: relative;
  overflow: hidden;
}
.article.private h4,
.article.private p {
  color: transparent;
  background:
    repeating-linear-gradient(
      92deg,
      var(--ink-2) 0 60%,
      transparent 60% 62%,
      var(--ink-2) 62% 85%,
      transparent 85% 88%,
      var(--ink-2) 88% 100%
    );
  -webkit-background-clip: text;
  background-clip: text;
  filter: blur(0);
  user-select: none;
  opacity: 0.22;
}
.article.private h4 {
  background: linear-gradient(90deg, var(--ink-2) 0 35%, transparent 35% 38%, var(--ink-2) 38% 70%, transparent 70% 74%, var(--ink-2) 74% 95%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  opacity: 0.25;
}
.article.private .stamp {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-11deg);
  padding: 8px 18px 6px;
  border: 3px solid var(--stamp);
  color: var(--stamp);
  font-family: var(--serif);
  font-weight: 900;
  font-style: italic;
  font-size: 28px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0.78;
  pointer-events: none;
  background: rgba(245, 241, 232, 0.55);
  box-shadow: inset 0 0 0 1px var(--stamp);
  mix-blend-mode: multiply;
}
.article.private .stamp small {
  display: block;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 500;
  font-style: normal;
  letter-spacing: 0.28em;
  margin-top: 2px;
  text-align: center;
  color: var(--stamp);
}
.article.private .stats .vote-only { color: var(--ink-2); }

/* ─────────── Ornament between sections ─────────── */
.ornament {
  padding: 22px 24px;
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--mute);
  letter-spacing: 0.02em;
}

/* ─────────── FAB (sticker style) ─────────── */
.fab {
  position: fixed;
  right: 20px;
  bottom: 24px;
  background: var(--accent);
  color: var(--paper);
  border: 2px solid var(--ink);
  padding: 14px 20px;
  border-radius: 0;
  font-family: var(--serif);
  font-weight: 700;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 0.01em;
  cursor: pointer;
  z-index: 20;
  box-shadow: 5px 5px 0 0 var(--ink);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  transform: rotate(-2deg);
}
.fab:hover { transform: rotate(-2deg) translate(-2px, -2px); box-shadow: 7px 7px 0 0 var(--ink); }
.fab:active { transform: rotate(-2deg) translate(2px, 2px); box-shadow: 2px 2px 0 0 var(--ink); }
.fab span {
  display: inline-block;
  margin-right: 6px;
  font-family: var(--mono);
  font-style: normal;
  font-weight: 500;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="mast">
    <div class="mast-top">
      <span><span class="seal">D</span>DAYSTEP · DISPATCH</span>
      <span>NO. 042 · APR 2026</span>
    </div>
    <h1>Bug &amp;<br/><em>Request</em><br/>Gazette.</h1>
    <p class="mast-sub">독자가 직접 쓰는 버그·기능 신문. 당신의 글은 당신과 편집팀만 읽을 수 있습니다.</p>
    <div class="mast-rule">
      <span>◆ READER-WRITTEN ◆ KOREAN EDITION</span>
      <span>₩ FREE</span>
    </div>
  </header>

  <nav class="nav">
    <button data-active="true">All<span>08</span></button>
    <button data-active="false">Bugs<span>04</span></button>
    <button data-active="false">Requests<span>04</span></button>
    <button data-active="false">Mine<span>02</span></button>
  </nav>

  <section class="issue-title">
    <h3>On the desk this week</h3>
    <em>edited by team</em>
  </section>

  <section class="grid" id="feed"></section>

  <div class="ornament">❖ ❖ ❖</div>

  <button class="fab" type="button"><span>✎</span>오늘의 제보</button>
</div>

<script src="./shared/mock-data.js"></script>
<script>
const statusLabel = {
  open: 'Open',
  triaged: 'Triaged',
  'under-review': 'Under review',
  shipped: 'Shipped',
  'wont-fix': "Won't fix",
};

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function renderArticle(post, idx) {
  const visible = window.isVisible(post, window.CURRENT_USER);
  const tagClass = post.type === 'bug' ? 'bug-tag' : 'feature-tag';
  const tagLabel = post.type === 'bug' ? 'BUG REPORT' : 'REQUEST';
  const num = String(idx + 1).padStart(2, '0');

  if (!visible) {
    return `
      <article class="article private">
        <div class="meta">
          <span><span class="tag ${tagClass}">${tagLabel}</span></span>
          <span>№ ${num} · ${post.createdAt}</span>
        </div>
        <h4>locked locked locked locked locked locked locked</h4>
        <p>locked locked locked locked locked locked locked locked locked locked locked locked</p>
        <div class="stats">
          <span class="vote-only">▲ ${post.votes} 표</span>
          <span>💬 ${post.comments}</span>
          <span>SEALED</span>
        </div>
        <div class="stamp">Classified<small>AUTHOR · EDITORS ONLY</small></div>
      </article>
    `;
  }

  const isFeatureArticle = idx === 0;
  const dropcap = isFeatureArticle && post.title.length > 0
    ? `<span class="dropcap">${post.title[0]}</span>${escapeHtml(post.title.slice(1))}`
    : escapeHtml(post.title);

  return `
    <article class="article">
      <div class="meta">
        <span><span class="tag ${tagClass}">${tagLabel}</span></span>
        <span>№ ${num} · ${post.createdAt}</span>
      </div>
      <h4>${dropcap}</h4>
      <p>${escapeHtml(post.body)}</p>
      <div class="stats">
        <span>▲ ${post.votes} 표</span>
        <span>💬 ${post.comments}</span>
        <span>STATUS · ${statusLabel[post.status].toUpperCase()}</span>
        ${post.hasAdminReply ? '<span class="reply">· 편집장 회신</span>' : ''}
        ${post.status === 'shipped' ? '<span class="ship">· SHIPPED</span>' : ''}
      </div>
    </article>
  `;
}

window.__renderBoard = function () {
  const feed = document.getElementById('feed');
  feed.innerHTML = window.POSTS.map(renderArticle).join('');
};

document.querySelectorAll('.nav button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(x => x.dataset.active = 'false');
    b.dataset.active = 'true';
  });
});

window.__renderBoard();
</script>
</body>
</html>
